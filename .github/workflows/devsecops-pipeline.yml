name: DevSecOps Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  IMAGE_NAME: secure-app
  PYTHON_VERSION: "3.12"
jobs:
  # Stage 1: Dependency Security Scan
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit
          pip install -r requirements.txt
      - name: Run pip-audit scan
        run: pip-audit --strict
      - name: Run Safety scan
        run: safety check -r requirements.txt
        continue-on-error: false
  # Stage 2: Static Code Analysis
  code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install linting tools
        run: |
          pip install bandit flake8
      - name: Run Bandit security linter
        run: bandit -r app/ -ll
      - name: Run Flake8
        run: flake8 app/ --max-line-length=100
  # Stage 3: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-analysis]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
  # Stage 4: Container Build
  container-build:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build container image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} -o image.tar
      - name: Upload container image
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: image.tar
  # Stage 5: Container Security Scan
  container-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [container-build]
    steps:
      - name: Download container image
        uses: actions/download-artifact@v4
        with:
          name: container-image
      - name: Load container image
        run: docker load -i image.tar
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
  # Stage 6: Deploy (Simulation)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy application
        run: |
          echo "🚀 Deploying ${{ env.IMAGE_NAME }}:${{ github.sha }} to production..."
          echo "✅ Deployment successful!"
